# docker-compose.domain.yml — HTTPS/domain overlay for Ride Rank Buddy
#
# Apply AFTER docker-compose.vps.yml when DNS is live:
#   DOMAIN=riderank.grupolamonica.com.br \
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml -f docker-compose.domain.yml up -d

services:

  frontend:
    labels:
      # HTTPS router — host-based + /ranking path
      - "traefik.http.routers.rr-frontend-https.rule=Host(`${DOMAIN}`) && PathPrefix(`/ranking`)"
      - "traefik.http.routers.rr-frontend-https.entrypoints=websecure"
      - "traefik.http.routers.rr-frontend-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.rr-frontend-https.priority=20"
      - "traefik.http.routers.rr-frontend-https.middlewares=rr-stripprefix"
      - "traefik.http.services.rr-frontend.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.rr-frontend-http.rule=Host(`${DOMAIN}`) && PathPrefix(`/ranking`)"
      - "traefik.http.routers.rr-frontend-http.entrypoints=web"
      - "traefik.http.routers.rr-frontend-http.middlewares=rr-https-redirect"
      - "traefik.http.middlewares.rr-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.rr-https-redirect.redirectscheme.permanent=true"
