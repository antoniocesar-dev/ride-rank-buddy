# docker-compose.yml — Ride Rank Buddy production stack
# Pure frontend SPA (Vite + React + Supabase). No backend container.
# Routing handled by platform-level Traefik (platform_public network).
#
# IP-only mode (no domain):
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d
#
# Domain mode (after DNS is live):
#   DOMAIN=riderank.grupolamonica.com.br \
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml -f docker-compose.domain.yml up -d

services:

  # ── Frontend (nginx:alpine serving Vite dist) ─────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ""
        VITE_SUPABASE_PUBLISHABLE_KEY: ""
    image: riderank-frontend:latest
    restart: unless-stopped
    networks:
      - riderank-net
      - platform_public
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=platform_public"
      # IP routing (no domain) — catch-all, lowest priority
      - "traefik.http.routers.rr-frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.rr-frontend.entrypoints=web"
      - "traefik.http.routers.rr-frontend.priority=1"
      - "traefik.http.services.rr-frontend.loadbalancer.server.port=80"

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  riderank-net:
    name: riderank-net
    driver: bridge
  platform_public:
    external: true
    name: platform_public
